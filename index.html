                                    <AlertCircleIcon className="h-8 w-8 text-red-600 flex-shrink-0" />
                                    <div className="flex flex-col text-center sm:text-left w-full mt-1 sm:mt-0">
                                    <span className="text-base sm:text-lg text-red-800 font-bold">Informasi Sesi Ditangguhkan</span>
                                    <span className="text-sm text-red-700 font-medium mt-1">
                                        Mohon maaf, jadwal pengambilan rapor tidak dapat ditampilkan. Harap selesaikan kewajiban pembayaran.
                                    </span>
                                    </div>
                                </div>
                                ) : (
                                <div 
                                    key={student.id} 
                                    className="bg-white rounded-xl shadow-sm border-l-4 border-emerald-500 overflow-hidden hover:shadow-md transition-shadow duration-200 p-5 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 group"
                                >
                                    <div className="flex items-start space-x-4">
                                    <div className="p-3 rounded-full transition-colors bg-slate-100 group-hover:bg-emerald-50">
                                        <UserIcon className="h-6 w-6 text-slate-500 group-hover:text-emerald-600" />
                                    </div>
                                    <div>
                                        <h3 className="text-lg font-bold text-slate-800 leading-tight mb-1">
                                        {student.name}
                                        </h3>
                                        <span className="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-slate-100 text-slate-700">
                                        Kelas: {student.className}
                                        </span>
                                    </div>
                                    </div>
                                    
                                    <div className="bg-emerald-50 border border-emerald-100 rounded-lg px-4 py-3 flex items-center w-full sm:w-auto mt-2 sm:mt-0 shadow-sm">
                                    <ClockIcon className="h-5 w-5 text-emerald-600 mr-2 flex-shrink-0" />
                                    <div className="flex flex-col text-left">
                                        <span className="text-xs text-emerald-700 font-semibold uppercase tracking-wider">Waktu</span>
                                        <span className="text-emerald-900 font-bold whitespace-nowrap">{student.time}</span>
                                    </div>
                                    </div>
                                </div>
                                )
                            ))}
                            </div>
                        ) : (
                            <div className="text-center py-12 px-4 bg-white rounded-2xl border border-slate-100 shadow-sm">
                            <div className="bg-red-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                                <SearchIcon className="h-8 w-8 text-red-400" />
                            </div>
                            <h3 className="text-lg font-medium text-slate-900 mb-1">Siswa Tidak Ditemukan</h3>
                            <p className="text-slate-500">
                                Pastikan ejaan nama sudah benar atau coba gunakan nama panggilan.
                            </p>
                            </div>
                        )}
                        </div>
                    </React.Fragment>
                    )}
                </main>

                {/* Footer */}
                <footer className="bg-white border-t border-slate-200 mt-auto">
                    <div className="max-w-4xl mx-auto px-4 py-6 sm:px-6 lg:px-8 flex flex-col sm:flex-row items-center justify-between text-sm text-slate-500">
                    <p className="text-center sm:text-left">© 2026 SMA Malika Boarding School. Harap datang tepat waktu sesuai jadwal.</p>
                    <button 
                        onClick={handleAdminAccessClick}
                        className={`mt-4 sm:mt-0 flex items-center p-2 transition-colors rounded-full ${isAdmin ? 'text-teal-600 bg-teal-50' : 'text-slate-300 hover:text-teal-600 hover:bg-slate-100'}`}
                        title={isAdmin ? "Tutup Akses Admin" : "Akses Admin"}
                    >
                        <ShieldIcon className="w-5 h-5" />
                    </button>
                    </div>
                </footer>

                {/* Modal Login Admin */}
                {showLoginModal && (
                    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm">
                    <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden">
                        <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                        <h3 className="text-lg font-bold text-slate-800 flex items-center">
                            <ShieldIcon className="w-5 h-5 text-teal-600 mr-2" />
                            Masuk Mode Admin
                        </h3>
                        <button 
                            onClick={() => setShowLoginModal(false)}
                            className="text-slate-400 hover:text-slate-600 transition-colors"
                        >
                            <XIcon className="w-5 h-5" />
                        </button>
                        </div>
                        <form onSubmit={handleLoginSubmit} className="p-6">
                        <div className="mb-4">
                            <label className="block text-sm font-medium text-slate-700 mb-2">Password Akses</label>
                            <input
                            type="password"
                            className={`w-full px-4 py-3 border ${loginError ? 'border-red-300 focus:ring-red-500' : 'border-slate-300 focus:ring-teal-500'} rounded-xl focus:outline-none focus:ring-2 focus:border-transparent transition-all`}
                            placeholder="Masukkan password..."
                            value={passwordInput}
                            onChange={(e) => {
                                setPasswordInput(e.target.value);
                                setLoginError('');
                            }}
                            autoFocus
                            />
                            {loginError && <p className="text-red-500 text-sm mt-2">{loginError}</p>}
                        </div>
                        <div className="flex justify-end gap-3 mt-6">
                            <button
                            type="button"
                            onClick={() => setShowLoginModal(false)}
                            className="px-4 py-2 text-slate-600 font-medium hover:bg-slate-100 rounded-lg transition-colors"
                            >
                            Batal
                            </button>
                            <button
                            type="submit"
                            className="px-4 py-2 bg-teal-600 text-white font-medium hover:bg-teal-700 rounded-lg transition-colors shadow-sm"
                            >
                            Masuk
                            </button>
                        </div>
                        </form>
                    </div>
                    </div>
                )}
                </div>
            );
        }

        // Render App ke dalam div#root
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
